name: CI and Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "echo SSH OK"

            - name: Debug remote paths
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" "
            echo 'PWD:'
            pwd
            echo 'LS /home/customer:'
            ls -la
            echo 'LS www:'
            ls -la www
            echo 'LS www/dev-player-app.simonedomenicoa6.sg-host.com:'
            ls -la www/dev-player-app.simonedomenicoa6.sg-host.com || true
            echo 'LS www/dev-player-app.simonedomenicoa6.sg-host.com/public_html:'
            ls -la www/dev-player-app.simonedomenicoa6.sg-host.com/public_html || true
          "

      - name: Deploy dist to dev subdomain
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            ./dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET_DIR_DEV }}/
